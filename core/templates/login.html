{% extends "base.html" %}
{% load static %}

{% block content %}

<style>
/* Contenedor principal del login:
   - min-height para centrar verticalmente en pantalla
   - flexbox para centrar horizontal y verticalmente */
.login-wrap{
  min-height:80vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* Tarjeta de login:
   - fondo blanco
   - bordes redondeados
   - padding interno amplio
   - sombra para destacar sobre el fondo */
.login-card{
  background:white;
  border-radius:20px;
  padding:40px 50px;
  width:100%;
  max-width:400px;
  box-shadow:0 8px 25px rgba(0,0,0,0.1);
  text-align:center;
}

/* Logo del login */
.login-logo{
  width:140px;
  margin-bottom:25px;
}

/* Título */
.login-card h2{
  margin-bottom:20px;
}

/* Contenedor de cada campo (label + input) */
.campo{
  display:flex;
  flex-direction:column;
  text-align:left;
  margin-bottom:15px;
}

/* Etiqueta del campo */
.campo label{
  margin-bottom:6px;
  font-weight:500;
}

/* Input de usuario/contraseña */
.campo input{
  padding:12px 14px;
  border-radius:12px;
  border:none;
  background:#f2f2f2;
  font-size:15px;
}

/* Botón de login */
.btn-login{
  margin-top:15px;
  width:100%;
  background:#14b8d4;
  color:white;
  border:none;
  padding:12px;
  border-radius:12px;
  font-weight:600;
  font-size:15px;
  cursor:pointer;
}

/* Hover botón login */
.btn-login:hover{
  filter:brightness(0.95);
}

/* Mensaje de error */
.error{
  color:red;
  font-size:14px;
  margin-bottom:10px;
}
</style>

<div class="login-wrap">

  <div class="login-card">

    <!-- LOGO DEL SISTEMA EN LOGIN -->
    <img src="{% static 'images/logo-login.png' %}" class="login-logo">

    <!-- TÍTULO -->
    <h2>Iniciar sesión</h2>

    <!-- FORMULARIO DE LOGIN:
         - POST porque envía credenciales
         - csrf_token obligatorio en Django -->
    <form method="POST">
      {% csrf_token %}

      <!-- MENSAJE DE ERROR:
           - se muestra si el formulario tiene errores (credenciales incorrectas) -->
      {% if form.errors %}
        <div class="error">
          Usuario o contraseña incorrectos
        </div>
      {% endif %}

      <!-- CAMPO USUARIO -->
      <div class="campo">
        <label for="id_username">Usuario</label>
        {{ form.username }}
      </div>

      <!-- CAMPO CONTRASEÑA -->
      <div class="campo">
        <label for="id_password">Contraseña</label>
        {{ form.password }}
      </div>

      <!-- BOTÓN SUBMIT -->
      <button type="submit" class="btn-login">
        Ingresar
      </button>

    </form>

  </div>

</div>

{% endblock %}
