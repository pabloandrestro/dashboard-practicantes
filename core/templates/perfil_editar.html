{% extends "base.html" %}


{% block content %}

<style>
  /* Contenedor general:
     - max-width para que el formulario no quede demasiado ancho.
     - margin auto para centrar.
     - padding para separar del borde.
     - box-sizing para que padding no rompa el ancho calculado. */
  .wrap{ max-width:900px; margin:0 auto; padding:30px 40px; box-sizing:border-box; }

  /* Barra superior:
     - flex para alinear título y botón "Volver" en una misma fila.
     - justify-content space-between separa izquierda/derecha.
     - gap para separación visual.
     - margin-bottom para dar espacio hacia el formulario. */
  .top{ display:flex; justify-content:space-between; align-items:center; gap:14px; margin-bottom:18px; }

  /* Estilo del título principal. */
  .top h1{ margin:0; font-size:46px; font-weight:900; }

  /* Botón base:
     - color principal celeste
     - tipografía fuerte
     - bordes redondeados
     - cursor pointer para indicar clickeable */
  .btn{ background:#14b8d4; color:#fff; border:none; padding:10px 16px; border-radius:12px; font-weight:800; text-decoration:none; display:inline-block; cursor:pointer; }

  /* Hover del botón:
     - bajo un poco el brillo para dar feedback al usuario. */
  .btn:hover{ filter:brightness(0.95); }

  /* Variante "ghost":
     - botón gris claro para acciones secundarias (volver/cancelar). */
  .btn-ghost{ background:#f2f2f2; color:#111; }

  /* Tarjeta contenedora del formulario:
     - borde negro grueso
     - esquinas redondeadas
     - fondo blanco
     - padding interno */
  .card{ border:2px solid #111; border-radius:18px; background:#fff; padding:18px; }

  /* Grid del formulario:
     - 2 columnas en desktop
     - gap para separación entre inputs */
  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }

  /* Etiquetas:
     - negrita para claridad
     - margen inferior para separar del input */
  label{ font-weight:800; font-size:14px; display:block; margin-bottom:6px; }

  /* Inputs:
     - ancho completo
     - padding
     - borde suave
     - box-sizing para que el ancho sea consistente */
  input{ width:100%; padding:10px 12px; border-radius:12px; border:1px solid #ddd; box-sizing:border-box; }

  /* Cada fila del grid:
     - margen inferior para separar visualmente los grupos */
  .row{ margin-bottom:12px; }

  /* Elementos que deben ocupar todo el ancho del grid (ambas columnas). */
  .row-full{ grid-column:1 / -1; }

  /* Título de sección (por ejemplo, "Cambiar contraseña"). */
  .section-title{ margin:12px 0 8px; font-size:16px; font-weight:900; }

  /* Texto de ayuda bajo un campo. */
  .hint{ font-size:13px; opacity:.75; margin-top:6px; }

  /* Contenedor de acciones:
     - alineo botones a la derecha
     - permito que bajen de línea si falta espacio */
  .actions{ display:flex; gap:10px; justify-content:flex-end; margin-top:14px; flex-wrap:wrap; }

  /* Mensaje de error:
     - fondo rojo claro y texto rojo oscuro
     - padding y borde redondeado */
  .error{ margin-bottom:12px; padding:10px 12px; border-radius:12px; background:#fee2e2; color:#7f1d1d; font-weight:800; }

  /* Responsive:
     - reduzco padding
     - paso a 1 columna
     - reduzco tamaño del título para pantallas menores */
  @media (max-width: 900px){
    .wrap{ padding:18px; }
    .grid{ grid-template-columns:1fr; }
    .top h1{ font-size:38px; }
  }
</style>

<div class="wrap">
  <div class="top">
    <h1>Editar perfil</h1>

    <!-- Botón para volver a la vista del perfil del practicante -->
    <a class="btn btn-ghost" href="{% url 'perfil' %}">Volver</a>
  </div>

  <!-- Si la vista envía un mensaje de error, lo muestro aquí -->
  {% if error %}
    <div class="error">{{ error }}</div>
  {% endif %}

  <!-- Formulario:
       - method POST porque estoy actualizando datos
       - enctype multipart/form-data para permitir subir imagen (foto_perfil) -->
  <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="card">
      <div class="grid">
        <div class="row">
          <label>Usuario</label>
          <!-- Username no se edita desde este formulario (solo informativo). -->
          <input type="text" value="{{ request.user.username }}" readonly>
        </div>

        <div class="row">
          <label>Email</label>
          <input type="email" name="email" value="{{ form.email.value|default_if_none:'' }}">
        </div>

        <div class="row">
          <label>Nombre</label>
          <input type="text" name="first_name" value="{{ form.first_name.value|default_if_none:'' }}">
        </div>

        <div class="row">
          <label>Apellido</label>
          <input type="text" name="last_name" value="{{ form.last_name.value|default_if_none:'' }}">
        </div>

        <div class="row">
          <label>Rut</label>
          <input type="text" name="rut" value="{{ form.rut.value|default_if_none:'' }}">
        </div>

        <div class="row">
          <label>Fecha de nacimiento</label>
          <input type="date" name="fecha_nacimiento" value="{{ form.fecha_nacimiento.value|default_if_none:'' }}">
        </div>

        <div class="row">
          <label>Universidad</label>
          <input type="text" name="universidad" value="{{ form.universidad.value|default_if_none:'' }}">
        </div>

        <div class="row">
          <label>Carrera</label>
          <input type="text" name="carrera" value="{{ form.carrera.value|default_if_none:'' }}">
        </div>

        <div class="row">
          <label>Celular</label>
          <input type="text" name="celular" value="{{ form.celular.value|default_if_none:'' }}">
        </div>

        <div class="row">
          <label>Inicio de práctica</label>
          <input type="date" name="fecha_inicio_practica" value="{{ form.fecha_inicio_practica.value|default_if_none:'' }}">
        </div>

        <div class="row">
          <label>Término de práctica</label>
          <input type="date" name="fecha_termino_practica" value="{{ form.fecha_termino_practica.value|default_if_none:'' }}">
        </div>

        <div class="row">
          <label>Horas requeridas</label>
          <input type="number" name="horas_requeridas" value="{{ form.horas_requeridas.value|default_if_none:'' }}">
        </div>

        <div class="row row-full">
          <label>Foto de perfil (opcional)</label>

          <!-- Input file para subir una imagen:
               accept="image/*" restringe selección a archivos de imagen -->
          <input type="file" name="foto_perfil" accept="image/*">

          <div class="hint">Si no subes una foto, se mantiene la actual.</div>
        </div>
      </div>

      <!-- Sección opcional de cambio de contraseña -->
      <div class="section-title">Cambiar contraseña (opcional)</div>

      <div class="grid">
        <div class="row">
          <label>Nueva contraseña</label>
          <!-- password1: primera entrada de nueva contraseña -->
          <input type="password" name="password1" placeholder="Deja vacío para no cambiar">
        </div>

        <div class="row">
          <label>Repetir nueva contraseña</label>
          <!-- password2: confirmación de nueva contraseña -->
          <input type="password" name="password2" placeholder="Repite la contraseña">
        </div>
      </div>

      <!-- Acciones del formulario:
           - Cancelar vuelve al perfil practicante sin guardar
           - Guardar envía POST -->
      <div class="actions">
        <a class="btn btn-ghost" href="{% url 'perfil' %}">Cancelar</a>
        <button class="btn" type="submit">Guardar cambios</button>
      </div>
    </div>
  </form>
</div>

{% endblock %}
