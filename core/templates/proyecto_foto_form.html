{% extends "base.html" %}
{% load static %}
{% block content %}
<style>
  .wrap{ max-width: 800px; margin: 0 auto; padding: 20px 40px; }
  .box{ border: 2px solid #2c2c2c; border-radius: 18px; padding: 18px 22px; }
  label{ display:block; margin-top: 12px; font-weight: 600; }
  input{
    width: 100%;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid rgba(0,0,0,0.15);
    font-size: 16px;
  }
  .btn{
    margin-top: 16px;
    background:#14b8d4; color:#fff; border:none; cursor:pointer;
    padding: 12px 22px; border-radius: 12px; font-weight: 600;
    font-size: 16px;
  }
</style>

<div class="wrap">
  <h1 style="margin:0 0 14px;">Cambiar foto — {{ proyecto.nombre }}</h1>

  <div class="box">
    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn" type="submit">Guardar foto</button>
    </form>
  </div>
</div>
{% endblock %}
